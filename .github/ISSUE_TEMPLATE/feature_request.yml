name: Feature request
description: Suggest an improvement or a new capability.
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please check existing issues
        first so we don't end up with duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point. Be concrete.
      placeholder: When I rewrite 50 product descriptions, I have to manually re-approve each one because I can't save a style preset.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? UI sketches, command examples, or just plain prose are all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you have tried to solve this, and why they didn't work.
    validations:
      required: false

  - type: dropdown
    id: tier
    attributes:
      label: Your current license tier
      options:
        - Free
        - Pro
        - Agency
        - Enterprise
        - Not a customer yet
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues for similar requests.
          required: true
