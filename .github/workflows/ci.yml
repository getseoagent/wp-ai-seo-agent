name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (bun)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     seoagent
          POSTGRES_PASSWORD: seoagent_dev_pwd
          POSTGRES_DB:       seoagent_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: install
        working-directory: backend
        run: bun install --frozen-lockfile
      - name: typecheck (strict, must be zero errors)
        working-directory: backend
        run: bunx tsc --noEmit
      - name: test
        working-directory: backend
        env:
          # Tests refuse to run if these are equal — see _helpers/test-db.ts.
          DATABASE_URL:      postgres://seoagent:seoagent_dev_pwd@127.0.0.1:5432/postgres
          TEST_DATABASE_URL: postgres://seoagent:seoagent_dev_pwd@127.0.0.1:5432/seoagent_test
        run: bun test

  plugin:
    name: plugin (phpunit + phpcs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none
      - name: install
        working-directory: plugin
        run: composer install --no-progress --prefer-dist
      - name: phpunit
        working-directory: plugin
        run: vendor/bin/phpunit
      - name: phpcs (must be 0 errors / 0 warnings)
        working-directory: plugin
        run: vendor/bin/phpcs --report=summary

  plugin-app:
    name: plugin-app (vitest + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: install
        working-directory: plugin-app
        run: bun install --frozen-lockfile
      - name: typecheck
        working-directory: plugin-app
        run: bunx tsc --noEmit
      - name: vitest
        working-directory: plugin-app
        run: bun run test

  build-zip:
    name: build wp.org zip (smoke)
    needs: [plugin, plugin-app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: build plugin-app dist
        working-directory: plugin-app
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: build wp.org zip
        run: scripts/build-wporg-zip.sh
      - name: upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: seo-agent-zip
          path: dist/seo-agent.zip
          retention-days: 30
