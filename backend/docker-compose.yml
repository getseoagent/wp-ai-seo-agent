# Self-host stack for the AI SEO Agent backend.
#
# Brings up the backend + a Postgres alongside it. Talks to your existing
# WordPress install via WP_BASE_URL — the WP DB is separate.
#
# First boot:
#   1. cp .env.example .env
#   2. fill in JWT_SECRET / LICENSE_HMAC_SECRET / WAYFORPAY_* / WP_BASE_URL
#   3. docker compose up -d
#   4. verify: curl http://localhost:8787/health
#
# JWT_SECRET in .env must match SEO_AGENT_JWT_SECRET in your wp-config.php.

services:
  backend:
    build: .
    image: seoagent-backend:local
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file: .env
    environment:
      # Override the local-default DATABASE_URL to point at the bundled pg.
      DATABASE_URL:      postgres://seoagent:seoagent_dev_pwd@db:5432/seoagent
      TEST_DATABASE_URL: postgres://seoagent:seoagent_dev_pwd@db:5432/seoagent_test
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     seoagent
      POSTGRES_PASSWORD: seoagent_dev_pwd
      POSTGRES_DB:       seoagent
    volumes:
      - seoagent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:    ["CMD-SHELL", "pg_isready -U seoagent"]
      interval: 5s
      retries:  10

volumes:
  seoagent_pgdata:
